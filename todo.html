<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A To Do List</title>
    <link rel="stylesheet" href="todo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    </head>
    <body>
        <div class="container">
            <div class="start">
                <h1>This is a to-do list. <i class="fa-solid fa-book"></i> </h1>
                <div class="task">
                    <input id="listitem" class="item" placeholder="enter task here">
                </div>
                <div class="tasker">
                    <button onclick="AddTask()">Next Task</button>
                    <button onclick="showall()">Show Tasks</button>
                    <button onclick="EditTask()" id='update'>Edit Tasks</button>
                    <button onclick="deleteall()">Delete All</button>
                </div>
                <ul id="submitted-items">
               
                       
        </ul>
            </div>

        </div>
        <script src="todo.js"></script>
    </body>
